apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen-1-5b
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen-1-5b
  template:
    metadata:
      labels:
        app: vllm-qwen-1-5b
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: ksy-workstation
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --model
            - Qwen/Qwen2.5-1.5B-Instruct
            - --tensor-parallel-size
            - "1"
            - --gpu-memory-utilization
            - "0.70"
          env:
            - name: HF_HOME
              value: /data/huggingface
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: cache
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: vllm-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: vllm-qwen-1-5b
  ports:
    - name: http
      port: 8000
      targetPort: http
